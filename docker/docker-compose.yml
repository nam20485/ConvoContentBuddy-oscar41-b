# Docker Compose for ConvoContentBuddy Local Development
# This file provides a complete local development environment
# For production, use .NET Aspire orchestration

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: convocontentbuddy-postgres
    environment:
      POSTGRES_USER: convocontentbuddy
      POSTGRES_PASSWORD: convocontentbuddy
      POSTGRES_DB: convocontentbuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convocontentbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: convocontentbuddy-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: convocontentbuddy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API.Brain Service
  api-brain:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: convocontentbuddy-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__postgres=Host=postgres;Port=5432;Database=convocontentbuddy;Username=convocontentbuddy;Password=convocontentbuddy
      - QDRANT__HOST=qdrant
      - QDRANT__PORT=6334
      - REDIS__HOST=redis
      - REDIS__PORT=6379
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # UI.Web (Blazor WASM)
  ui-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: convocontentbuddy-web
    ports:
      - "8080:80"
    depends_on:
      - api-brain
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  default:
    name: convocontentbuddy-network
